<svg viewBox="0 0 1100 820" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <style>
      .room { fill: #1e2530; stroke: #4a5568; stroke-width="2" }
      .room-label { fill: #a0aec0; font-size: 13px; font-weight: 500; text-anchor: middle }
      .wall { fill: #2d3748; stroke: #4a5568; stroke-width: 8 }
      .door { fill: none; stroke: #68d391; stroke-width: 2; stroke-dasharray: 4,2 }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" fill="#111827"/>

  <!-- WIATA (external) -->
  <rect x="10" y="80" width="110" height="660" fill="#161f2e" stroke="#374151" stroke-width="3" rx="2"/>
  <text x="65" y="415" class="room-label" transform="rotate(-90,65,415)">WIATA</text>
  <text x="65" y="435" class="room-label" transform="rotate(-90,65,435)" font-size="10">(5×10)</text>

  <!-- Main house outer wall -->
  <rect x="120" y="20" width="960" height="780" fill="none" stroke="#4a5568" stroke-width="6" rx="2"/>

  <!-- === TOP ROW === -->

  <!-- KOTŁOWNIA (top-left) -->
  <rect x="123" y="23" width="340" height="340" fill="#1a2332" stroke="#374151" stroke-width="1.5"/>
  <text x="293" y="170" class="room-label">KOTŁOWNIA</text>
  <text x="293" y="190" fill="#4a9eff" font-size="12" text-anchor="middle" id="piec-label">🌡 Piec</text>

  <!-- KIBELEK (top-center narrow) -->
  <rect x="463" y="23" width="120" height="200" fill="#1a2332" stroke="#374151" stroke-width="1.5"/>
  <text x="523" y="100" class="room-label">KIBE-</text>
  <text x="523" y="117" class="room-label">LEK</text>

  <!-- SYPIALNIA RODZICÓW (top-right large) -->
  <rect x="583" y="23" width="494" height="340" fill="#1a2332" stroke="#374151" stroke-width="1.5"/>
  <text x="830" y="170" class="room-label">SYPIALNIA</text>
  <text x="830" y="190" fill="#4a9eff" font-size="12" text-anchor="middle">🌡 Podłoga</text>

  <!-- KUCHNIA (center, between top and bottom) -->
  <rect x="463" y="200" width="120" height="230" fill="#1a2332" stroke="#374151" stroke-width="1.5"/>
  <text x="523" y="300" class="room-label">KUCH-</text>
  <text x="523" y="317" class="room-label">NIA</text>
  <text x="523" y="340" fill="#4a9eff" font-size="11" text-anchor="middle">🌡 Podłoga</text>

  <!-- === MIDDLE RIGHT: PRALNIA + SCHODY (center area) -->
  <rect x="123" y="363" width="340" height="100" fill="#1a2535" stroke="#374151" stroke-width="1.5"/>
  <text x="293" y="415" class="room-label">PRALNIA / SCHODY</text>

  <!-- === BOTTOM ROW === -->

  <!-- SALON (bottom-left large) -->
  <rect x="123" y="463" width="340" height="334" fill="#1a2332" stroke="#374151" stroke-width="1.5"/>
  <text x="293" y="600" class="room-label">SALON</text>
  <text x="293" y="623" fill="#4a9eff" font-size="12" text-anchor="middle">🌡 Podłoga</text>
  <text x="293" y="645" fill="#fbbf24" font-size="11" text-anchor="middle">💡 Oświetlenie</text>

  <!-- WIATROŁAP (bottom-center) -->
  <rect x="463" y="430" width="120" height="367" fill="#1a2332" stroke="#374151" stroke-width="1.5"/>
  <text x="523" y="590" class="room-label" transform="rotate(-90,523,590)">WIATROŁAP</text>
  <text x="523" y="640" fill="#4a9eff" font-size="11" text-anchor="middle">🌡</text>

  <!-- KORYTARZ (bottom center-right) -->
  <rect x="583" y="430" width="180" height="367" fill="#1a2535" stroke="#374151" stroke-width="1.5"/>
  <text x="673" y="630" class="room-label" transform="rotate(-90,673,630)">KORYTARZ</text>

  <!-- SYPIALNIA MALWINA (right top-bottom split) -->
  <rect x="763" y="363" width="354" height="230" fill="#1a2332" stroke="#374151" stroke-width="1.5"/>
  <text x="940" y="455" class="room-label">SYPIALNIA</text>
  <text x="940" y="472" class="room-label">MALWINA</text>
  <text x="940" y="495" fill="#4a9eff" font-size="12" text-anchor="middle">🌡 Podłoga</text>

  <!-- SYPIALNIA LAURA (right bottom) -->
  <rect x="763" y="593" width="354" height="204" fill="#1a2332" stroke="#374151" stroke-width="1.5"/>
  <text x="940" y="680" class="room-label">SYPIALNIA</text>
  <text x="940" y="697" class="room-label">LAURA</text>
  <text x="940" y="720" fill="#4a9eff" font-size="12" text-anchor="middle">🌡 Termostat</text>

  <!-- Floor label -->
  <text x="550" y="810" fill="#4a5568" font-size="11" text-anchor="middle">PARTER</text>
</svg>

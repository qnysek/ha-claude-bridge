<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="900" height="620" fill="#111827"/>

  <!-- Balkon/wiata lewa -->
  <rect x="10" y="30" width="80" height="480" fill="#161f2e" stroke="#374151" stroke-width="2" rx="2"/>
  <text x="50" y="280" fill="#4a5568" font-size="11" text-anchor="middle" transform="rotate(-90,50,280)">BALKON 5×10</text>

  <!-- Outer wall -->
  <rect x="90" y="20" width="760" height="580" fill="none" stroke="#4a5568" stroke-width="5" rx="2"/>

  <!-- ŁAZIENKA (lewy górny) -->
  <rect x="93" y="23" width="340" height="240" fill="#1a2332" stroke="#374151" stroke-width="1.5"/>
  <text x="263" y="120" fill="#a0aec0" font-size="14" font-weight="500" text-anchor="middle">ŁAZIENKA</text>
  <text x="263" y="145" fill="#4a9eff" font-size="12" text-anchor="middle">🌡 Podłoga</text>

  <!-- SKŁADZIK I SERWEROWNIA (lewy dolny) -->
  <rect x="93" y="263" width="340" height="334" fill="#1a2332" stroke="#374151" stroke-width="1.5"/>
  <text x="263" y="400" fill="#a0aec0" font-size="14" font-weight="500" text-anchor="middle">SKŁADZIK</text>
  <text x="263" y="418" fill="#a0aec0" font-size="14" font-weight="500" text-anchor="middle">I SERWEROWNIA</text>
  <text x="263" y="448" fill="#4a9eff" font-size="12" text-anchor="middle">🌡 TRV</text>

  <!-- KORYTARZ GÓRA 1 (środek górny mały) -->
  <rect x="433" y="23" width="100" height="560" fill="#1a2535" stroke="#374151" stroke-width="1.5"/>
  <text x="483" y="320" fill="#a0aec0" font-size="12" text-anchor="middle" transform="rotate(-90,483,320)">KORYTARZ GÓRA</text>
  <text x="483" y="400" fill="#4a9eff" font-size="11" text-anchor="middle">🌡</text>

  <!-- GARDEROBA RODZICÓW (prawy górny) -->
  <rect x="533" y="23" width="314" height="190" fill="#1a2332" stroke="#374151" stroke-width="1.5"/>
  <text x="690" y="100" fill="#a0aec0" font-size="14" font-weight="500" text-anchor="middle">GARDEROBA</text>
  <text x="690" y="118" fill="#a0aec0" font-size="14" font-weight="500" text-anchor="middle">RODZICÓW</text>
  <text x="690" y="145" fill="#4a9eff" font-size="12" text-anchor="middle">🌡 TRV</text>

  <!-- GABINET (prawy środek) -->
  <rect x="533" y="213" width="314" height="190" fill="#1a2332" stroke="#374151" stroke-width="1.5"/>
  <text x="690" y="300" fill="#a0aec0" font-size="14" font-weight="500" text-anchor="middle">GABINET</text>
  <text x="690" y="325" fill="#4a9eff" font-size="12" text-anchor="middle">🌡 TRV</text>

  <!-- GARDEROBA DZIECI (prawy dolny) -->
  <rect x="533" y="403" width="314" height="194" fill="#1a2332" stroke="#374151" stroke-width="1.5"/>
  <text x="690" y="488" fill="#a0aec0" font-size="14" font-weight="500" text-anchor="middle">GARDEROBA</text>
  <text x="690" y="506" fill="#a0aec0" font-size="14" font-weight="500" text-anchor="middle">DZIECI</text>
  <text x="690" y="533" fill="#4a9eff" font-size="12" text-anchor="middle">🌡 TRV</text>

  <text x="450" y="612" fill="#4a5568" font-size="11" text-anchor="middle">PIĘTRO</text>
</svg>
